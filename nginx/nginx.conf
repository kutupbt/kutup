worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting zones.
    # `auth` is intentionally aggressive — login/register/recover are
    # credential-facing and 10/min per IP is plenty.
    # `api` was 60r/m + burst 20 originally. The new file-editor route fires a
    # burst of API calls per opened tab (collection, files list, blob
    # download, version list, device register) and multi-tab usage compounds
    # it. Switch to a per-second rate with a generous burst so legitimate
    # tab-spawn doesn't 503 while still throttling abusive hammering.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;

    # Map HTTP Connection header for WebSocket upgrade. "upgrade" if the client
    # sent Upgrade: websocket, otherwise empty so we don't break keepalive.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP → HTTPS redirect. Browser users typing http:// get bumped up.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server (the only end-user surface).
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Use Docker's embedded DNS so upstreams resolve lazily at request time,
        # not at nginx startup (avoids "host not found" crash when containers start).
        resolver 127.0.0.11 valid=5s;
        set $backend  "http://backend:3000";
        set $frontend "http://frontend:80";
        set $seaweedfs "http://seaweedfs-s3:8333";

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # WASM requires 'wasm-unsafe-eval' for libsodium. Some libsodium-sumo
        # paths also use dynamic-Function-style codec stubs which CSP counts
        # as eval, so we add 'unsafe-eval' too. The application's threat
        # model is server-cannot-read-user-data (E2EE); CSP eval restriction
        # is defense-in-depth and acceptable to relax for the crypto library.
        # WebSocket upgrade requires wss: in connect-src.
        # frame-src + media-src include blob: so the in-tab viewers can render
        # decrypted PDFs (iframe + blob: URL) and audio/video (HTML5 media +
        # blob: URL) without the browser falling back to default-src.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; frame-src 'self' blob:; connect-src 'self' wss:; worker-src 'self' blob:; font-src 'self';" always;

        client_max_body_size 10G;

        # Collab WebSocket: /api/files/:fileId/collab/ws
        # MUST be matched before the general /api/ block.
        location ~ ^/api/files/[^/]+/collab/ws$ {
            proxy_pass $backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # Long timeouts for live editing sessions.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Auth endpoints — stricter rate limiting
        location ~ ^/api/auth/(login|register|recover) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass $backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass $backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Swagger
        location /swagger/ {
            proxy_pass $backend$request_uri;
            proxy_set_header Host $host;
        }

        # Internal SeaweedFS proxy for presigned download URLs
        location /internal/storage/ {
            internal;
            proxy_pass $seaweedfs$request_uri;
            proxy_set_header Host seaweedfs-s3:8333;
        }

        # Frontend SPA
        location / {
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
        }
    }
}
