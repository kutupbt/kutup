worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    server {
        listen 80;
        server_name _;

        # Use Docker's embedded DNS so upstreams resolve lazily at request time,
        # not at nginx startup (avoids "host not found" crash when containers start).
        resolver 127.0.0.11 valid=5s;
        set $backend  "http://backend:3000";
        set $frontend "http://frontend:80";
        set $seaweedfs "http://seaweedfs-s3:8333";

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # WASM requires 'wasm-unsafe-eval' for libsodium
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; font-src 'self';" always;

        client_max_body_size 10G;

        # Auth endpoints — stricter rate limiting
        location ~ ^/api/auth/(login|register|recover) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass $backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $backend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Internal SeaweedFS proxy for presigned download URLs
        location /internal/storage/ {
            internal;
            proxy_pass $seaweedfs$request_uri;
            proxy_set_header Host seaweedfs-s3:8333;
        }

        # Frontend SPA
        location / {
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass $frontend$request_uri;
            proxy_set_header Host $host;
        }
    }
}
