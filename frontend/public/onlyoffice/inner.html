  kutup ↔ OnlyOffice bridge page.
  Loaded by OfficeEditor.tsx in an <iframe>; hosts the OnlyOffice editor and
  relays postMessage between the kutup React parent and the editor's mock
  server. Architecturally a 1:1 port of CryptPad's www/common/onlyoffice/
  inner.html + inner.js (AGPL), narrowed to what kutup needs.

  Phase 2b: loads OnlyOffice's api.js + instantiates DocsAPI.DocEditor with a
  blank template and a stub config. No connectMockServer yet — auth hangs,
  but the editor's chrome (toolbar, ribbon, blank canvas) should render.
  Phase 2c adds the mockServer callbacks.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OnlyOffice — Kutup</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      /* Layout pattern copied 1:1 from CryptPad's app-oo.less:
         OnlyOffice's DocsAPI does NOT mount its iframe inside the
         placeholder — it inserts the iframe as a SIBLING of the placeholder
         (the placeholder div is just a positional marker DocsAPI uses for
         the constructor argument). The recipe is a flex-column container
         with `flex: 1` on any descendant iframe, which is how CryptPad makes
         the editor fill its host across all builds. */
      body {
        display: flex;
        flex-flow: column;
      }
      #editor-host {
        flex: 1;
        min-height: 0;
        position: relative;
        display: flex;
        flex-flow: column;
      }
      #editor-host iframe {
        flex: 1;
        border: 0;
        margin: 0;
        padding: 0;
      }
      /* Status pill is hidden by default — kutup parent shows the bridge
         state in its own navbar; the floating pill is just a debug helper
         the bridge can re-enable on errors via #status:not(:empty). */
      #status {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="editor-host">
      <div id="placeholder"></div>
    </div>
    <!-- Hidden sibling iframe that runs the x2t WASM converter. Loaded once
         at boot; conversions go through `x2tConvert(input, fileName, format)`
         (defined in the script below). Phase 3a wires the bridge; Phase 3b
         calls it on first OOXML open. -->
    <iframe
      id="x2t-frame"
      src="/onlyoffice/x2t.html"
      style="display:none"
      title="x2t bridge"
    ></iframe>
    <div id="status">bridge: idle</div>

    <script>
      (function () {
        'use strict'

        var EXPECTED_ORIGIN = window.location.origin
        var docType = null
        var fileId = null

        // CSS injected into the OnlyOffice editor iframe at onAppReady to
        // hide stock branding + chrome that doesn't fit kutup's surface.
        // Lifted verbatim from CryptPad's `www/common/onlyoffice/inner.js`
        // (~line 2002-2024). v9-compatible — re-check upstream when bumping
        // the OnlyOffice build, since selectors are private API.
        var KUTUP_HIDE_BRANDING_CSS = [
          // Title bar (top centre): document name + user name pill.
          '#title-doc-name { display: none !important; }',
          '#title-user-name { display: none !important; }',
          // Insert tab: equation slot + the trailing separator before it.
          'section[data-tab="ins"] .separator:nth-last-child(2) { display: none !important; }',
          '#slot-btn-insequation { display: none !important; }',
          // File menu: "Document info" entry + its panel (carries the
          // OnlyOffice About / build version — primary branding hide).
          '#fm-btn-info { display: none !important; }',
          '#panel-info { display: none !important; }',
          // Image / textart "from URL": kutup is E2EE, no remote fetch.
          '#image-button-from-url { display: none !important; }',
          '.cp-from-url, #textart-button-from-url { display: none !important; }',
          // Status bar (bottom): language selector + spell-check toggle.
          // No backend for either in kutup.
          '.statusbar .cnt-lang { display: none !important; }',
          '.statusbar #btn-doc-spell { display: none !important; }',
          // File menu: dividers + spell-check / about sidebar entries.
          '#file-menu-panel .devider { display: none !important; }',
          '#left-btn-spellcheck, #left-btn-about { display: none !important; }',
          // Toolbar Users dropdown — kutup renders its own cursor presence,
          // OnlyOffice's peer list is redundant.
          'div.btn-users.dropdown-toggle { display: none !important; }',
        ].join('\n')

        // Map kutup file extension → OnlyOffice template script + DocsAPI types.
        var DOC_TYPES = {
          docx: { template: 'oodoc_base.js',   documentType: 'word',  fileType: 'docx' },
          xlsx: { template: 'oocell_base.js',  documentType: 'cell',  fileType: 'xlsx' },
          pptx: { template: 'ooslide_base.js', documentType: 'slide', fileType: 'pptx' },
        }

        var setStatus = function (text) {
          var el = document.getElementById('status')
          if (el) el.textContent = 'bridge: ' + text
        }

        var send = function (target, msg) {
          target.postMessage(msg, EXPECTED_ORIGIN)
        }

        // ---------- x2t bridge ------------------------------------------------
        // Tracks pending convert calls by requestId. `x2tConvert(input,
        // fileName, format)` returns a Promise resolved with { output: Uint8,
        // images: [{name,data}] } or rejected with a JS error.
        var x2tReady = false
        var x2tReadyResolvers = []
        var x2tNextRequestId = 1
        var x2tPending = {}

        var x2tWaitReady = function () {
          if (x2tReady) return Promise.resolve()
          return new Promise(function (resolve) { x2tReadyResolvers.push(resolve) })
        }

        var x2tConvert = function (input, fileName, outputFormat, extra) {
          return x2tWaitReady().then(function () {
            var iframe = document.getElementById('x2t-frame')
            if (!iframe || !iframe.contentWindow) {
              return Promise.reject(new Error('x2t iframe missing'))
            }
            var requestId = x2tNextRequestId++
            return new Promise(function (resolve, reject) {
              x2tPending[requestId] = { resolve: resolve, reject: reject }
              var msg = {
                type: 'convert',
                requestId: requestId,
                input: input,
                fileName: fileName,
                outputFormat: outputFormat,
              }
              if (extra && extra.images) msg.images = extra.images
              if (extra && extra.mediasSources) msg.mediasSources = extra.mediasSources
              if (extra && extra.mediasData) msg.mediasData = extra.mediasData
              iframe.contentWindow.postMessage(msg, EXPECTED_ORIGIN)
            })
          })
        }

        // Surface x2tConvert globally so debugging from devtools is easy and
        // future phases (3b/4a/4c) can call it without re-deriving the
        // request/response plumbing.
        window.x2tConvert = x2tConvert

        // ---------- AMD shim --------------------------------------------------
        // The CryptPad templates (oodoc_base.js, oocell_base.js, ooslide_base.js)
        // are AMD modules: `define(function () { return function (newOO) { return
        // 'DOCY;v5;…'; }; })`. We're not pulling in RequireJS for one shim, so
        // implement a single-use `define` that captures the factory result, plus
        // a `define.amd` so other AMD-aware scripts that might end up here
        // detect us.
        var capturedFactory = null
        window.define = function (factory) {
          capturedFactory = factory
        }
        window.define.amd = {}

        var loadScript = function (src) {
          return new Promise(function (resolve, reject) {
            var s = document.createElement('script')
            s.src = src
            s.onload = function () { resolve() }
            s.onerror = function () { reject(new Error('script load failed: ' + src)) }
            document.head.appendChild(s)
          })
        }

        var loadTemplate = function (filename) {
          capturedFactory = null
          return loadScript('/onlyoffice/templates/' + filename).then(function () {
            if (typeof capturedFactory !== 'function') {
              throw new Error('template did not call define()')
            }
            // Factory returns a function which, called with newOO=true, returns
            // the DOCY/XLSY/PPTY string.
            var maker = capturedFactory()
            if (typeof maker !== 'function') {
              throw new Error('template factory did not return a function')
            }
            return maker(true)
          })
        }

        // ---------- DocsAPI bootstrap ----------------------------------------
        var ooConfigBuilt = false

        // ---------- Mock-server callbacks (Phase 2c stub) ---------------------
        // CryptPad-fork's connectMockServer is the auth gateway: when we
        // supply these callbacks, the OO fork handles the auth handshake
        // internally using their results. fromOO() additionally handles a
        // few non-auth message kinds. Phase 5+ will replace stubs with real
        // collab plumbing; Phase 6+ adds lock state.
        var docEditor = null
        // OnlyOffice's chainpad-style commit index — CryptPad's ooChannel.cpIndex.
        // Incremented for BOTH outbound saveChanges (after we send to peers)
        // and inbound saveChanges (after applying a remote op). The current
        // value goes out on every outbound saveChanges as `changesIndex` so
        // peers know "this op applies on top of N committed messages", and
        // back to OO via unSaveLock so it releases its commit lock and lets
        // the user keep typing.
        var cpIndex = 0
        // Stable per-tab identity for change attribution. CryptPad uses the
        // user's account uid plus a random suffix; we use a random hex per
        // tab session.
        var myUniqueOOId = 'kutup-' + Math.random().toString(36).slice(2, 10)
        var myOOId = 2  // SELF_INDEX_USER below

        var sendToOO = function (obj) {
          if (!docEditor) return
          docEditor.sendMessageToOO(obj)
        }

        var nextRandomId = function (prefix) {
          return prefix + Math.random().toString(36).slice(2, 10)
        }

        // History-keeper presence (constant id=1) prevents OnlyOffice's
        // "you're alone in this document" UI from confusing users.
        var HISTORY_KEEPER_INDEX_USER = 1
        var SELF_INDEX_USER = 2

        // Live peer list. Keyed by deviceId so every wire-format peer
        // entry maps to a stable {id, indexUser, username, connectionId}
        // that OnlyOffice expects in its connectState message.
        // peerByDevice[deviceId] = oo participant entry (see makePeer).
        var peerByDevice = Object.create(null)
        var lastConnectStateTs = 0
        var selfDeviceId = null  // set in init handler from msg.payload.deviceId

        // Allocate a per-device indexUser starting from SELF_INDEX_USER+1.
        // OO requires every peer to have a distinct positive integer index.
        // We assign on first sight and remember (so the same device keeps
        // its index across leave/rejoin within the same session).
        var nextIndex = SELF_INDEX_USER + 1
        var indexByDevice = Object.create(null)
        function indexFor(deviceId) {
          if (deviceId === selfDeviceId) return SELF_INDEX_USER
          var k = String(deviceId)
          if (!(k in indexByDevice)) {
            indexByDevice[k] = nextIndex++
          }
          return indexByDevice[k]
        }

        function makePeer(deviceId, username) {
          var idx = indexFor(deviceId)
          var label = username || ('user-' + deviceId)
          var idStr = String(deviceId)
          return {
            id: idStr,
            idOriginal: idStr,
            username: label,
            indexUser: idx,
            connectionId: 'dev-' + deviceId,
            isCloseCoAuthoring: false,
            view: false,
          }
        }

        var historyKeeperPeer = {
          id: '0',
          idOriginal: '0',
          username: 'History',
          indexUser: HISTORY_KEEPER_INDEX_USER,
          connectionId: 'hk',
          isCloseCoAuthoring: false,
          view: false,
        }

        // Self placeholder used until the first oo-peers arrives. The
        // editor calls getParticipants synchronously on mount; if our
        // peer list is empty (hello not yet processed), we fall back to
        // [historyKeeper, self] so OO doesn't barf on an empty list.
        var selfPlaceholder = {
          id: String(SELF_INDEX_USER),
          idOriginal: String(SELF_INDEX_USER),
          username: 'You',
          indexUser: SELF_INDEX_USER,
          connectionId: 'self',
          isCloseCoAuthoring: false,
          view: false,
        }

        function buildParticipantList() {
          var peers = [historyKeeperPeer]
          var keys = Object.keys(peerByDevice)
          if (keys.length === 0) {
            peers.push(selfPlaceholder)
            return peers
          }
          for (var i = 0; i < keys.length; i++) peers.push(peerByDevice[keys[i]])
          return peers
        }

        var getParticipants = function () {
          return {
            index: SELF_INDEX_USER,
            list: buildParticipantList(),
          }
        }

        // Push the current peer list into OO via connectState. Bumps a
        // monotonic timestamp so OO can dedupe stale messages. Mirrors
        // CryptPad's handleNewIds (inner.js:1100-1106).
        function emitConnectState() {
          var ts = Date.now()
          if (ts <= lastConnectStateTs) ts = lastConnectStateTs + 1
          lastConnectStateTs = ts
          sendToOO({
            type: 'connectState',
            participantsTimestamp: ts,
            participants: buildParticipantList(),
            waitAuth: false,
          })
        }

        var fromOO = function (obj) {
          if (!obj || !obj.type) return
          switch (obj.type) {
            case 'auth':
              // Handled internally by OO fork now. No-op.
              break
            case 'isSaveLock':
              sendToOO({ type: 'saveLock', saveLock: false })
              break
            case 'getMessages':
              sendToOO({ type: 'message' })
              break
            case 'getLock':
              // Phase 6a will gate by shared state; for 2c grant immediately.
              sendToOO({ type: 'getLock', locks: [] })
              break
            case 'releaseLock':
              // Phase 6a; no-op for 2c.
              break
            case 'saveChanges':
              // 1:1 port of CryptPad's parseChanges + handleChanges
              // (inner.js:1340 + :1357). OnlyOffice emits obj.changes as a
              // JSON-encoded STRING (e.g. `'["AgAA…","AgAB…"]'`), not as a
              // JS array — so we must JSON.parse before mapping. The earlier
              // `Array.isArray(obj.changes)` check fell through to `[]` for
              // every commit, producing the empty-heartbeat symptom that
              // blocked Phase 5. Each parsed string is then wrapped in the
              // {docid, change, time, user, useridoriginal} envelope OO's
              // _onSaveChanges → _updateChanges path expects.
              try {
                var rawChanges
                try {
                  rawChanges = typeof obj.changes === 'string' ? JSON.parse(obj.changes) : obj.changes
                } catch (_) {
                  rawChanges = []
                }
                if (!Array.isArray(rawChanges)) rawChanges = []
                var wrapped = rawChanges.map(function (m) {
                  return {
                    docid: 'fresh',
                    change: '"' + m + '"',
                    time: Date.now(),
                    user: myUniqueOOId,
                    useridoriginal: String(myOOId),
                  }
                })
                var outboundMsg = {
                  type: 'saveChanges',
                  changes: wrapped,
                  changesIndex: cpIndex,
                  locks: [],
                  excelAdditionalInfo: obj.excelAdditionalInfo,
                  startSaveChanges: obj.startSaveChanges,
                  endSaveChanges: obj.endSaveChanges,
                }
                console.log('[kutup-bridge] outbound saveChanges raw=' + rawChanges.length + ' wrapped=' + wrapped.length + ' cpIndex=' + cpIndex)
                if (window.parent && window.parent !== window && rawChanges.length > 0) {
                  // Skip empty (heartbeat) saveChanges — peers don't need them.
                  window.parent.postMessage(
                    { type: 'oo-local-op', payload: JSON.stringify(outboundMsg) },
                    EXPECTED_ORIGIN,
                  )
                }
              } catch (err) {
                console.warn('[kutup-bridge] saveChanges wrap failed', err)
              }
              // Tell OO the server has committed THROUGH the cpIndex value
              // we just sent in changesIndex. CryptPad does it in this order
              // (inner.js:1427-1434): send unSaveLock with the CURRENT
              // cpIndex first, THEN increment. Doing the ++ before the
              // unSaveLock advances OO's "what's committed" pointer one
              // step ahead of what peers actually saw — the result is
              // OnlyOffice's state machine refusing the next remote frame
              // (the user-reported "second-direction sync stalls" bug).
              if (obj.endSaveChanges === false) {
                sendToOO({ type: 'savePartChanges', changesIndex: -1, time: Date.now() })
              } else {
                sendToOO({ type: 'unSaveLock', index: cpIndex, time: Date.now() })
              }
              cpIndex++
              break
            case 'cursor':
              // Phase 5c forwards cursor presence; no-op for 2c.
              break
            case 'unLockDocument':
              // After saveChanges, OnlyOffice fires unLockDocument with
              // isSave:true and waits for a sentinel unSaveLock {time:-1,
              // index:-1} before it'll allow another local edit to commit.
              // Without this ack, OO stays in "saving" state and refuses
              // to emit the next saveChanges — manifesting as the user-
              // reported "second tab can't send after applying a remote op".
              // Mirrors CryptPad inner.js:1663-1669.
              if (obj.isSave) {
                sendToOO({ type: 'unSaveLock', time: -1, index: -1 })
              }
              // The releaseLocks branch needs a content.locks state
              // machine, which we don't have post-revert; OO degrades
              // gracefully without it for the single-cell-at-a-time path.
              break
            default:
              console.log('[kutup-bridge] unhandled OO msg type=' + obj.type, obj)
              break
          }
        }

        var startEditor = function (cfg) {
          if (!window.DocsAPI || typeof window.DocsAPI.DocEditor !== 'function') {
            throw new Error('window.DocsAPI.DocEditor not found after api.js load')
          }
          docEditor = new window.DocsAPI.DocEditor('placeholder', cfg)
          // The CryptPad-fork's connectMockServer assigns its callbacks onto
          // window.APP (CryptPad's global state container) — e.g.
          // `window.APP.getImageURL = e.getImageURL ? ... : ...`. Without a
          // seeded APP object we crash with "Cannot set properties of
          // undefined (setting 'getImageURL')". Seed it minimally; the fork
          // only ever sets keys, never reads ours.
          window.APP = window.APP || {}
          // CryptPad's pattern: connectMockServer immediately after
          // instantiation (inner.js:2631). The fork only exposes this method
          // when the editor build supports it (v7+).
          if (typeof docEditor.connectMockServer === 'function') {
            docEditor.connectMockServer({
              onMessage: fromOO,
              getParticipants: getParticipants,
              onAuth: function () {
                setStatus('editor: auth')
              },
              getInitialChanges: function () {
                // Phase 5b returns queued ops since last checkpoint. For 2c
                // there are no ops yet — empty array is correct.
                return []
              },
              getImageURL: function (_name) {
                // OnlyOffice calls .then() on the return value, so it MUST
                // be a Promise (CryptPad's getImageURL at inner.js:2342
                // returns a Promise too). Phase 7 will resolve embedded
                // image refs; for 2c the empty doc has no images.
                return Promise.resolve('')
              },
            })
            setStatus('editor mounted + mockServer connected')
          } else {
            setStatus('editor mounted (no connectMockServer on this build)')
          }
        }

        // Detect kutup's 1-byte "+ New" placeholder — anything that isn't a
        // ZIP archive (PK\x03\x04) is treated as the template-fallback case.
        var isOoxml = function (bytes) {
          if (!bytes || bytes.length < 4) return false
          return bytes[0] === 0x50 && bytes[1] === 0x4b && bytes[2] === 0x03 && bytes[3] === 0x04
        }

        var buildAndStart = function (payload) {
          if (ooConfigBuilt) return
          ooConfigBuilt = true

          var t = DOC_TYPES[payload.type]
          if (!t) {
            setStatus('unsupported type: ' + payload.type)
            return
          }

          var initialBytes = payload.initialBytes
          // initialBytes arrives as a Uint8Array from postMessage's
          // structured clone; some older browsers deliver it as a plain
          // ArrayBuffer-like object, so coerce defensively.
          if (initialBytes && !(initialBytes instanceof Uint8Array)) {
            try { initialBytes = new Uint8Array(initialBytes) } catch (e) { initialBytes = null }
          }
          var useExisting = isOoxml(initialBytes)

          var docPromise
          if (useExisting) {
            // Existing OOXML file: convert to OnlyOffice's .bin via x2t.
            setStatus('converting ' + payload.type + ' via x2t…')
            docPromise = x2tConvert(initialBytes, 'input.' + t.fileType, 'bin')
              .then(function (res) {
                setStatus('converted (' + res.output.length + ' bytes), loading api.js…')
                return new Blob([res.output], { type: 'application/octet-stream' })
              })
              .catch(function (err) {
                console.error('[kutup-bridge] x2t convert failed:', err)
                setStatus('x2t convert failed; falling back to empty doc')
                // Fall back to template if conversion fails.
                return loadTemplate(t.template).then(function (templateString) {
                  return new Blob([templateString], { type: 'text/plain' })
                })
              })
          } else {
            setStatus('loading template ' + t.template + '…')
            docPromise = loadTemplate(t.template).then(function (templateString) {
              setStatus('template loaded (' + templateString.length + ' chars), loading api.js…')
              // OnlyOffice expects the document.url to fetch the binary. The
              // CryptPad templates are stored as text in DOCY/XLSY/PPTY format;
              // OnlyOffice parses that header. text/plain MIME matches CryptPad's
              // saveToServer (line ~596 in CP's inner.js).
              return new Blob([templateString], { type: 'text/plain' })
            })
          }

          return docPromise
            .then(function (blob) {
              var url = URL.createObjectURL(blob)

              return loadScript('/onlyoffice/dist/v9/web-apps/apps/api/documents/api.js')
                .then(function () {
                  setStatus('api.js loaded, mounting editor…')
                  var cfg = {
                    // OnlyOffice's createIframe (api-orig.js:1262) sets
                    // iframe.width = config.width / iframe.height = config.height.
                    // Without these the iframe falls back to the browser's
                    // 300x150 default. '100%' makes it fill the host.
                    width: '100%',
                    height: '100%',
                    document: {
                      fileType: t.fileType,
                      key: 'fresh',  // hardcoded per CryptPad — we manage doc identity ourselves
                      title: payload.filename || ('Untitled.' + t.fileType),
                      url: url,
                      permissions: {
                        edit: true,        // explicit
                        comment: false,
                        review: false,
                        download: true,
                        print: true,
                        // protect: false on xlsx — `protect: true` locks all
                        // cells from editing, which silently disabled
                        // saveChanges emission for collab.
                        protect: false,
                        chat: false,
                      },
                    },
                    documentType: t.documentType,
                    editorConfig: {
                      customization: {
                        compactHeader: true,
                        // chat moved to permissions per OO deprecation warning.
                        comments: false,
                        hideRightMenu: true,
                        uiTheme: 'theme-classic-light',
                      },
                      // Force fast coediting mode so each cell commit
                      // emits saveChanges immediately instead of buffering
                      // for the next strict-mode flush.
                      coEditing: { mode: 'fast', change: true },
                      user: {
                        id: '1',
                        firstname: 'You',
                        name: 'You',
                      },
                      mode: 'edit',  // mockServer is wired in 2c — full edit mode.
                      lang: (navigator.language || 'en').slice(0, 2),
                    },
                    events: {
                      onAppReady: function () {
                        setStatus('editor: app ready')
                        // Hide OnlyOffice's stock branding/chrome. injectCSS
                        // is OnlyOffice's documented API for landing rules in
                        // the editor's nested iframe — used for theme switch
                        // upstream too. No-op if the editor build doesn't
                        // expose it (older v6/v7 forks); v9 has it.
                        try {
                          if (docEditor && typeof docEditor.injectCSS === 'function') {
                            docEditor.injectCSS(KUTUP_HIDE_BRANDING_CSS)
                          }
                        } catch (err) {
                          console.warn('[kutup-bridge] injectCSS failed', err)
                        }
                      },
                      onDocumentReady: function () { setStatus('editor: document ready') },
                      onError: function (e) {
                        console.error('OO error:', e)
                        setStatus('editor error — see console')
                      },
                    },
                  }
                  startEditor(cfg)
                })
            })
            .catch(function (err) {
              console.error('inner.html startup failed:', err)
              setStatus('error: ' + (err && err.message ? err.message : String(err)))
            })
        }

        // ---------- postMessage protocol -------------------------------------
        var params = new URLSearchParams(window.location.search)
        docType = params.get('type')
        fileId = params.get('fileId')
        setStatus('idle (type=' + docType + ')')

        window.addEventListener('message', function (e) {
          if (e.origin !== EXPECTED_ORIGIN) return
          var msg = e.data
          if (!msg || typeof msg !== 'object') return

          // ---- x2t iframe → us ----
          if (msg.type === 'x2t-ready') {
            x2tReady = true
            x2tReadyResolvers.splice(0).forEach(function (r) { r() })
            console.log('[kutup-bridge] x2t ready')
            return
          }
          if (msg.type === 'x2t-error') {
            console.error('[kutup-bridge] x2t bootstrap error:', msg.error)
            return
          }
          if (msg.type === 'convert-result') {
            var p = x2tPending[msg.requestId]
            if (p) {
              delete x2tPending[msg.requestId]
              p.resolve({ output: msg.output, images: msg.images || [] })
            }
            return
          }
          if (msg.type === 'convert-error') {
            var pe = x2tPending[msg.requestId]
            if (pe) {
              delete x2tPending[msg.requestId]
              pe.reject(new Error(msg.error || 'x2t convert failed'))
            }
            return
          }

          // ---- kutup parent → us ----
          switch (msg.type) {
            case 'ping':
              send(e.source, { type: 'pong' })
              return
            case 'init':
              buildAndStart(msg.payload || {})
              send(e.source, { type: 'init-ack' })
              return
            case 'save-request':
              handleSaveRequest(e.source, msg.requestId)
              return
            case 'oo-remote-op':
              // A saveChanges payload from another peer. Re-emit it to
              // OnlyOffice via sendMessageToOO so the editor applies it,
              // and bump our local cpIndex so the next outbound saveChanges
              // carries the correct changesIndex (CryptPad does this in the
              // MESSAGE handler at inner.js:1000-1002).
              try {
                var payload = JSON.parse(msg.payload)
                var changesLen = payload && payload.changes ? payload.changes.length : 0
                if (changesLen === 0) return  // ignore heartbeat-shaped echoes
                console.log('[kutup-bridge] applying remote op changes=' + changesLen + ' cpIndex=' + cpIndex)
                sendToOO(payload)
                cpIndex++
              } catch (err) {
                console.warn('[kutup-bridge] bad oo-remote-op payload', err)
              }
              return
            case 'oo-self':
              // Parent tells us which deviceId in oo-peers entries is OUR
              // tab. Stored so we can filter ourselves out of the
              // participant list (self always sits at SELF_INDEX_USER;
              // no per-device entry needed).
              if (typeof msg.deviceId === 'number') {
                selfDeviceId = msg.deviceId
                console.log('[kutup-bridge] selfDeviceId set to', selfDeviceId)
              }
              return
            case 'oo-peers':
              // Server pushed the current peer roster (relay's Hub fires
              // this on join + leave). Rebuild our peer index, then emit
              // connectState into OO so subsequent remote saveChanges from
              // those peers aren't rejected as "unknown user". Mirrors
              // CryptPad's handleNewIds (inner.js:1097-1106) — the missing
              // piece that was causing the second-direction stall in xlsx.
              try {
                var list = Array.isArray(msg.list) ? msg.list : []
                var nextById = Object.create(null)
                for (var i = 0; i < list.length; i++) {
                  var entry = list[i]
                  if (!entry || typeof entry.deviceId === 'undefined') continue
                  var did = entry.deviceId
                  // Skip self — we render at SELF_INDEX_USER (selfPlaceholder).
                  // If selfDeviceId hasn't been received yet (parent's
                  // oo-self message arrives async), include the entry — it
                  // will be re-emitted on the next oo-peers after oo-self
                  // arrives.
                  if (selfDeviceId !== null && did === selfDeviceId) continue
                  nextById[String(did)] = makePeer(did, entry.username)
                }
                peerByDevice = nextById
                console.log('[kutup-bridge] peers updated count=' + (Object.keys(nextById).length + 1))
                emitConnectState()
              } catch (err) {
                console.warn('[kutup-bridge] bad oo-peers payload', err)
              }
              return
          }
        })

        // The OnlyOffice editor instance lives inside the editor iframe at
        // window.editor (word + slide builds). The cell (xlsx) build aliases
        // it as window.editorCell when window.editor is undefined — see
        // sdkjs/cell/sdk-all-min.js: `window.editor==undefined)window.editorCell=this`.
        // CryptPad's getEditor (inner.js:376) only checked .editor; that
        // worked for older versions or because they set window.editor
        // upstream. We probe both names for v9.
        var getInnerEditor = function () {
          if (!docEditor || typeof docEditor.getIframe !== 'function') return null
          var ifr = docEditor.getIframe()
          if (!ifr || !ifr.contentWindow) return null
          var w = ifr.contentWindow
          return w.editor || w.editorCell || w.editorDoc || w.editorSlide || null
        }

        var handleSaveRequest = function (replyTo, requestId) {
          if (!docEditor || !docType) {
            replyTo.postMessage({
              type: 'save-result', requestId: requestId,
              error: 'editor not ready',
            }, EXPECTED_ORIGIN)
            return
          }
          try {
            var inner = getInnerEditor()
            if (!inner || typeof inner.asc_nativeGetFile !== 'function') {
              throw new Error('asc_nativeGetFile not available on this OO build')
            }
            var bin = inner.asc_nativeGetFile()
            // bin is a Uint8Array of OnlyOffice's .bin format. Convert to
            // the original OOXML extension via x2t so kutup stores the
            // file in the user-visible format.
            var outFmt = docType  // 'docx' | 'xlsx' | 'pptx'
            x2tConvert(bin, 'out.bin', outFmt)
              .then(function (res) {
                replyTo.postMessage({
                  type: 'save-result', requestId: requestId,
                  bytes: res.output,
                  format: outFmt,
                }, EXPECTED_ORIGIN)
              })
              .catch(function (err) {
                replyTo.postMessage({
                  type: 'save-result', requestId: requestId,
                  error: 'x2t convert failed: ' + (err && err.message || err),
                }, EXPECTED_ORIGIN)
              })
          } catch (err) {
            replyTo.postMessage({
              type: 'save-result', requestId: requestId,
              error: (err && err.message) || String(err),
            }, EXPECTED_ORIGIN)
          }
        }

        if (window.parent && window.parent !== window) {
          send(window.parent, { type: 'ready', docType: docType })
        }
      })()
    </script>
  </body>
</html>
