# Isolated two-server unified Chat + Drive federation integration topology.
# Run it through scripts/test-chat-federation.sh; it uses a dedicated Compose
# project and tmpfs databases, so it cannot alter the ordinary development stack.
services:
  postgres-a:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kutup
      POSTGRES_USER: kutup
      POSTGRES_PASSWORD: federation_test_a
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kutup"]
      interval: 1s
      timeout: 3s
      retries: 30

  postgres-b:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kutup
      POSTGRES_USER: kutup
      POSTGRES_PASSWORD: federation_test_b
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kutup"]
      interval: 1s
      timeout: 3s
      retries: 30

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    command: master -mdir=/data -defaultReplication=000
    tmpfs:
      - /data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    command: volume -mserver=seaweedfs-master:9333 -dir=/data -max=10
    tmpfs:
      - /data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    command: filer -master=seaweedfs-master:9333
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    command: s3 -filer=seaweedfs-filer:8888 -port=8333 -config=/etc/seaweedfs/s3.json
    volumes:
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    depends_on:
      - seaweedfs-filer

  seaweedfs-init-a:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: kutup
      AWS_SECRET_ACCESS_KEY: kutup_dev_s3_secret
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: kutup-federation-a
    volumes:
      - ./seaweedfs-init.sh:/seaweedfs-init.sh:ro
      - ./lifecycle.json:/etc/kutup/lifecycle.json:ro
    entrypoint: ["sh", "/seaweedfs-init.sh"]
    depends_on:
      - seaweedfs-s3

  seaweedfs-init-b:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: kutup
      AWS_SECRET_ACCESS_KEY: kutup_dev_s3_secret
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: kutup-federation-b
    volumes:
      - ./seaweedfs-init.sh:/seaweedfs-init.sh:ro
      - ./lifecycle.json:/etc/kutup/lifecycle.json:ro
    entrypoint: ["sh", "/seaweedfs-init.sh"]
    depends_on:
      - seaweedfs-s3

  backend-a:
    image: ${KUTUP_FEDERATION_IMAGE:-kutup-federation-server:local}
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://kutup:federation_test_a@postgres-a:5432/kutup?sslmode=disable
      JWT_SECRET: federation-test-a-jwt-secret-at-least-32-bytes
      S3_ENDPOINT: http://seaweedfs-s3:8333
      S3_ACCESS_KEY: kutup
      S3_SECRET_KEY: kutup_dev_s3_secret
      S3_BUCKET: kutup-federation-a
      S3_REGION: us-east-1
      APP_ENV: test
      SERVER_URL: http://a.test
      ALLOWED_ORIGINS: http://127.0.0.1:39081
      ADMIN_ACCOUNT: federation-admin-a@example.test:admina:federation-admin-temp
      SEAWEEDFS_MASTER_URL: ""
      FEDERATION_SERVER_NAME: a.test
      FEDERATION_SIGNING_KEY: VVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVU=
      FEDERATION_TEST_ALLOW_PRIVATE: "true"
      CHAT_TRANSPARENCY_SIGNING_KEY: MzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzM=
      RATE_LIMIT_LOGIN_PER_MIN: 1000
      RATE_LIMIT_PREFLIGHT_PER_MIN: 1000
      RATE_LIMIT_CHAT_KEYS_PER_MIN: 1000
      RATE_LIMIT_CHAT_KEYS_IP_PER_MIN: 1000
      RATE_LIMIT_REGISTER_PER_HOUR: 1000
      RATE_LIMIT_FED_USERS_PER_MIN: 1000
    depends_on:
      postgres-a:
        condition: service_healthy
      seaweedfs-init-a:
        condition: service_completed_successfully

  backend-b:
    image: ${KUTUP_FEDERATION_IMAGE:-kutup-federation-server:local}
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://kutup:federation_test_b@postgres-b:5432/kutup?sslmode=disable
      JWT_SECRET: federation-test-b-jwt-secret-at-least-32-bytes
      S3_ENDPOINT: http://seaweedfs-s3:8333
      S3_ACCESS_KEY: kutup
      S3_SECRET_KEY: kutup_dev_s3_secret
      S3_BUCKET: kutup-federation-b
      S3_REGION: us-east-1
      APP_ENV: test
      SERVER_URL: http://b.test
      ALLOWED_ORIGINS: http://127.0.0.1:39082
      ADMIN_ACCOUNT: federation-admin-b@example.test:adminb:federation-admin-temp
      SEAWEEDFS_MASTER_URL: ""
      FEDERATION_SERVER_NAME: b.test
      FEDERATION_SIGNING_KEY: ZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmZmY=
      FEDERATION_TEST_ALLOW_PRIVATE: "true"
      CHAT_TRANSPARENCY_SIGNING_KEY: REREREREREREREREREREREREREREREREREREREREREQ=
      RATE_LIMIT_LOGIN_PER_MIN: 1000
      RATE_LIMIT_PREFLIGHT_PER_MIN: 1000
      RATE_LIMIT_CHAT_KEYS_PER_MIN: 1000
      RATE_LIMIT_CHAT_KEYS_IP_PER_MIN: 1000
      RATE_LIMIT_REGISTER_PER_HOUR: 1000
      RATE_LIMIT_FED_USERS_PER_MIN: 1000
    depends_on:
      postgres-b:
        condition: service_healthy
      seaweedfs-init-b:
        condition: service_completed_successfully

  edge-a:
    image: nginx:alpine
    environment:
      BACKEND: backend-a
    ports:
      - "127.0.0.1:${KUTUP_FED_A_PORT:-39081}:80"
    volumes:
      - ./tests/chat-federation/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      default:
        aliases:
          - a.test
    depends_on:
      - backend-a
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health"]
      interval: 1s
      timeout: 3s
      retries: 60

  edge-b:
    image: nginx:alpine
    environment:
      BACKEND: backend-b
    ports:
      - "127.0.0.1:${KUTUP_FED_B_PORT:-39082}:80"
    volumes:
      - ./tests/chat-federation/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      default:
        aliases:
          - b.test
    depends_on:
      - backend-b
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health"]
      interval: 1s
      timeout: 3s
      retries: 60
