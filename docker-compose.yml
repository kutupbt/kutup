version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kutup}
      POSTGRES_USER: ${POSTGRES_USER:-kutup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kutup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: master -mdir=/data -defaultReplication=000
    volumes:
      - ./data/seaweedfs-master:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: volume -mserver=seaweedfs-master:9333 -dir=/data -max=100
    volumes:
      - ./data/seaweedfs-volume:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -s3
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: s3 -filer=seaweedfs-filer:8888 -port=8333 -config=/etc/seaweedfs/s3.json
    volumes:
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    depends_on:
      - seaweedfs-filer
    # No ports exposed — only reachable from backend/nginx internally

  seaweedfs-init:
    image: amazon/aws-cli:latest
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-kutup}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-kutupSecret}
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-kutup-files}
    volumes:
      - ./seaweedfs-init.sh:/seaweedfs-init.sh:ro
      - ./lifecycle.json:/etc/kutup/lifecycle.json:ro
    entrypoint: ["sh", "/seaweedfs-init.sh"]
    depends_on:
      - seaweedfs-s3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kutup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kutup}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://seaweedfs-s3:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kutup}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-kutupSecret}
      S3_BUCKET: ${S3_BUCKET:-kutup-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      APP_ENV: ${APP_ENV:-production}
      ADMIN_ACCOUNTS: ${ADMIN_ACCOUNTS:-}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
