version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kutup}
      POSTGRES_USER: ${POSTGRES_USER:-kutup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kutup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: master -mdir=/data -defaultReplication=000
    volumes:
      - ./data/seaweedfs-master:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: volume -mserver=seaweedfs-master:9333 -dir=/data -max=100
    volumes:
      - ./data/seaweedfs-volume:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -s3
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: s3 -filer=seaweedfs-filer:8888 -port=8333 -config=/etc/seaweedfs/s3.json
    volumes:
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    depends_on:
      - seaweedfs-filer
    # No ports exposed — only reachable from backend/nginx internally

  seaweedfs-init:
    image: amazon/aws-cli:latest
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-kutup}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-kutup_dev_s3_secret}
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-kutup-files}
    volumes:
      - ./seaweedfs-init.sh:/seaweedfs-init.sh:ro
      - ./lifecycle.json:/etc/kutup/lifecycle.json:ro
    entrypoint: ["sh", "/seaweedfs-init.sh"]
    depends_on:
      - seaweedfs-s3

  backend:
    # The Rust kutup-server (Axum). Build context is the workspace root so the Cargo
    # workspace + the embedded migrations (crates/kutup-server/migrations) are available.
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kutup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kutup}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://seaweedfs-s3:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kutup}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-kutup_dev_s3_secret}
      S3_BUCKET: ${S3_BUCKET:-kutup-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      APP_ENV: ${APP_ENV:-production}
      # Single break-glass admin (email:username:password) — created on first boot; it can
      # never be demoted/disabled/deleted via the API.
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:-}
      # SeaweedFS master — probed for real storage capacity + usage (admin dashboard).
      SEAWEEDFS_MASTER_URL: ${SEAWEEDFS_MASTER_URL:-http://seaweedfs-master:9333}
      # Fallback capacity for the admin Settings card when the probe is unavailable. 0 → hidden.
      STORAGE_TOTAL_BYTES: ${STORAGE_TOTAL_BYTES:-0}
      # Days a trashed item stays restorable before the sweeper purges it. 0 disables the sweep.
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
      CHAT_MAILBOX_RETENTION_DAYS: ${CHAT_MAILBOX_RETENTION_DAYS:-30}
      CHAT_SEND_RETENTION_DAYS: ${CHAT_SEND_RETENTION_DAYS:-30}
      CHAT_DEVICE_EXPIRY_DAYS: ${CHAT_DEVICE_EXPIRY_DAYS:-90}
      FEDERATION_SERVER_NAME: ${FEDERATION_SERVER_NAME:-}
      FEDERATION_SIGNING_KEY: ${FEDERATION_SIGNING_KEY:-}
      FEDERATION_NEXT_SIGNING_KEY: ${FEDERATION_NEXT_SIGNING_KEY:-}
      FEDERATION_TEST_ALLOW_PRIVATE: ${FEDERATION_TEST_ALLOW_PRIVATE:-false}
      CHAT_TRANSPARENCY_SIGNING_KEY: ${CHAT_TRANSPARENCY_SIGNING_KEY}
      CHAT_TRANSPARENCY_WITNESSES: ${CHAT_TRANSPARENCY_WITNESSES:-}
      CHAT_TRANSPARENCY_WITNESS_QUORUM: ${CHAT_TRANSPARENCY_WITNESS_QUORUM:-0}
      # Per-IP/account rate limits + per-account login lockout (blank → server defaults).
      RATE_LIMIT_LOGIN_PER_MIN: ${RATE_LIMIT_LOGIN_PER_MIN:-}
      RATE_LIMIT_PREFLIGHT_PER_MIN: ${RATE_LIMIT_PREFLIGHT_PER_MIN:-}
      RATE_LIMIT_CHAT_KEYS_PER_MIN: ${RATE_LIMIT_CHAT_KEYS_PER_MIN:-}
      RATE_LIMIT_CHAT_KEYS_IP_PER_MIN: ${RATE_LIMIT_CHAT_KEYS_IP_PER_MIN:-}
      RATE_LIMIT_REGISTER_PER_HOUR: ${RATE_LIMIT_REGISTER_PER_HOUR:-}
      RATE_LIMIT_RECOVERY_PER_HOUR: ${RATE_LIMIT_RECOVERY_PER_HOUR:-}
      RATE_LIMIT_FED_USERS_PER_MIN: ${RATE_LIMIT_FED_USERS_PER_MIN:-}
      RATE_LIMIT_ADMIN_PER_MIN: ${RATE_LIMIT_ADMIN_PER_MIN:-}
      LOGIN_LOCKOUT_THRESHOLD: ${LOGIN_LOCKOUT_THRESHOLD:-}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "38080:80"
      - "38443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
