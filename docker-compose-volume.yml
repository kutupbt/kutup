services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kutup}
      POSTGRES_USER: ${POSTGRES_USER:-kutup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kutup}"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: master -mdir=/data -defaultReplication=000
    volumes:
      - seaweedfs_master_data:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: volume -mserver=seaweedfs-master:9333 -dir=/data -max=100
    volumes:
      - seaweedfs_volume_data:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: filer -master=seaweedfs-master:9333 -s3
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kutup}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-kutupSecret}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<EOF
        {
          "identities": [{
            "name": "kutup",
            "credentials": [{"accessKey": "$$S3_ACCESS_KEY", "secretKey": "$$S3_SECRET_KEY"}],
            "actions": ["Admin", "Read", "Write", "List", "Tagging"]
          }]
        }
        EOF
        exec weed s3 -filer=seaweedfs-filer:8888 -port=8333 -config=/etc/seaweedfs/s3.json
    depends_on:
      - seaweedfs-filer
    # No ports exposed — only reachable from backend/nginx internally

  seaweedfs-init:
    image: amazon/aws-cli:latest
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-kutup}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-kutupSecret}
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      sh -c "
        echo 'Waiting for SeaweedFS S3...' &&
        until aws --endpoint-url http://seaweedfs-s3:8333 s3 ls 2>/dev/null; do
          echo 'Retrying in 3s...' && sleep 3;
        done &&
        aws --endpoint-url http://seaweedfs-s3:8333 s3 mb s3://${S3_BUCKET:-kutup-files} --region us-east-1 2>/dev/null || true &&
        echo 'Bucket ready.'
      "
    depends_on:
      - seaweedfs-s3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kutup}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kutup}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://seaweedfs-s3:8333
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kutup}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-kutupSecret}
      S3_BUCKET: ${S3_BUCKET:-kutup-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      APP_ENV: ${APP_ENV:-production}
      ADMIN_ACCOUNTS: ${ADMIN_ACCOUNTS:-}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  nginx_certs:
