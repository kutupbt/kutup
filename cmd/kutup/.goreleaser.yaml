# GoReleaser config for the `kutup` CLI (this directory: cmd/kutup/).
# Triggered by `v*` tags via .github/workflows/release.yml, which runs
# `goreleaser release` with workdir = cmd/kutup. Separate from the desktop
# app's `desktop-v*` releases (release-desktop.yml).
version: 2

project_name: kutup

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: kutup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: kutupbulut
    name: kutup
  name_template: "{{ .ProjectName }} v{{ .Version }}"
  # Create the GitHub release as a draft — review/edit the notes, then publish.
  draft: true
  # auto = flag the GitHub release as a prerelease when the tag's version has a
  # semver prerelease segment (v1.2.3-alpha.1 / -beta.N / -rc.N). Already the
  # default; explicit here so the behaviour is obvious. A prerelease can never
  # be GitHub's "latest", so no `make_latest` override is needed.
  prerelease: auto
