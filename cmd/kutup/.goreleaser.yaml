# GoReleaser config for the `kutup` CLI (this directory: cmd/kutup/).
# Triggered by `v*` tags via .github/workflows/release.yml, which runs
# `goreleaser release` with workdir = cmd/kutup. Separate from the desktop
# app's `desktop-v*` releases (release-desktop.yml).
version: 2

project_name: kutup

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: kutup
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: kutupbulut
    name: kutup
  name_template: "{{ .ProjectName }} v{{ .Version }}"
