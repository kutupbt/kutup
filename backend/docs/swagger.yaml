basePath: /api
definitions:
  handlers.AddIncomingShareRequest:
    properties:
      inviteUrl:
        type: string
    type: object
  handlers.CollectionRow:
    properties:
      canDelete:
        type: boolean
      canUpload:
        type: boolean
      color:
        type: string
      encryptedKey:
        type: string
      encryptedKeyNonce:
        type: string
      encryptedName:
        type: string
      id:
        type: string
      isShared:
        type: boolean
      nameNonce:
        type: string
      ownerUserId:
        type: string
      parentCollectionId:
        type: string
      uploadQuotaBytes:
        type: integer
      uploadUsedBytes:
        type: integer
    type: object
  handlers.CreateAdminUserRequest:
    properties:
      email:
        type: string
      storageQuotaBytes:
        type: integer
      tempPassword:
        type: string
      username:
        type: string
    type: object
  handlers.CreateCollectionRequest:
    properties:
      encryptedKey:
        type: string
      encryptedKeyNonce:
        type: string
      encryptedName:
        type: string
      nameNonce:
        type: string
      parentCollectionId:
        type: string
    type: object
  handlers.CreateCollectionResult:
    properties:
      id:
        type: string
    type: object
  handlers.CreateShareRequest:
    properties:
      encryptedCollectionKey:
        type: string
      encryptedCollectionKeyNonce:
        type: string
      expiresInHours:
        type: integer
      shareType:
        type: string
      targetId:
        type: string
    type: object
  handlers.CreateShareResult:
    properties:
      id:
        type: string
      token:
        type: string
    type: object
  handlers.DownloadURLResponse:
    properties:
      url:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.FedInviteResponse:
    properties:
      canDelete:
        type: boolean
      canUpload:
        type: boolean
      encryptedName:
        type: string
      nameNonce:
        type: string
      uploadQuotaBytes:
        type: integer
      wrappedKey:
        type: string
    type: object
  handlers.FileRow:
    properties:
      collectionId:
        type: string
      createdAt:
        type: string
      encryptedFileKey:
        type: string
      encryptedMetadata:
        type: string
      encryptedSizeBytes:
        type: integer
      fileKeyNonce:
        type: string
      id:
        type: string
      metadataNonce:
        type: string
      updatedAt:
        type: string
      uploaderUserId:
        type: string
    type: object
  handlers.IncomingShare:
    properties:
      canDelete:
        type: boolean
      canUpload:
        type: boolean
      createdAt:
        type: string
      encryptedCollectionKey:
        type: string
      encryptedName:
        type: string
      id:
        type: string
      nameNonce:
        type: string
      remoteServer:
        type: string
      uploadQuotaBytes:
        type: integer
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      loginKey:
        description: base64(Argon2id(password, loginKeySalt))
        type: string
    type: object
  handlers.LoginResponse:
    properties:
      accessToken:
        type: string
      encryptedMasterKey:
        type: string
      encryptedPrivateKey:
        type: string
      isAdmin:
        type: boolean
      masterKeyNonce:
        type: string
      preAuthToken:
        type: string
      privateKeyNonce:
        type: string
      publicKey:
        type: string
      requiresSetup:
        type: boolean
      requiresTotp:
        type: boolean
      setupToken:
        type: string
      storageQuotaBytes:
        type: integer
      storageUsedBytes:
        type: integer
      userId:
        type: string
      username:
        type: string
    type: object
  handlers.MeResponse:
    properties:
      email:
        type: string
      id:
        type: string
      isAdmin:
        type: boolean
      publicKey:
        type: string
      storageQuotaBytes:
        type: integer
      storageUsedBytes:
        type: integer
      totpEnabled:
        type: boolean
      username:
        type: string
    type: object
  handlers.MessageResponse:
    properties:
      message:
        type: string
    type: object
  handlers.PreflightLoginResponse:
    properties:
      kdfSalt:
        type: string
      loginKeySalt:
        type: string
    type: object
  handlers.PreflightRecoverResponse:
    properties:
      encryptedPrivateKey:
        type: string
      encryptedRecoveryKey:
        type: string
      privateKeyNonce:
        type: string
      recoveryKeyNonce:
        type: string
    type: object
  handlers.PubkeyResponse:
    properties:
      publicKey:
        type: string
    type: object
  handlers.PublicShareResponse:
    properties:
      encryptedCollectionKey:
        type: string
      encryptedCollectionKeyNonce:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      shareType:
        type: string
      targetId:
        type: string
    type: object
  handlers.RecoverRequest:
    properties:
      email:
        type: string
      newEncryptedMasterKey:
        type: string
      newKdfSalt:
        type: string
      newLoginKey:
        description: |-
          Client proves mnemonic possession by providing encryptedMasterKey decrypted
          with recoveryKey, then re-encrypted with new keyEncryptionKey
        type: string
      newLoginKeySalt:
        type: string
      newMasterKeyNonce:
        type: string
      recoveryProof:
        description: 'Recovery proof: base64(recoveryKeyEntropy) — verified against
          stored bcrypt verifier'
        type: string
    type: object
  handlers.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  handlers.RefreshResponse:
    properties:
      accessToken:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      encryptedMasterKey:
        description: Encrypted key material
        type: string
      encryptedPrivateKey:
        type: string
      encryptedRecoveryKey:
        type: string
      kdfSalt:
        type: string
      loginKey:
        description: bcrypt(Argon2id(password, loginKeySalt)) — client sends loginKey,
          server bcrypts
        type: string
      loginKeySalt:
        type: string
      masterKeyNonce:
        type: string
      privateKeyNonce:
        type: string
      publicKey:
        type: string
      recoveryKeyNonce:
        type: string
      recoveryProof:
        description: 'Recovery proof: base64(recoveryKeyEntropy) — server bcrypts
          and stores as verifier (S1-2 fix)'
        type: string
      username:
        type: string
    type: object
  handlers.SettingsResponse:
    properties:
      registrationEnabled:
        type: boolean
    type: object
  handlers.ShareCollectionRequest:
    properties:
      canDelete:
        type: boolean
      canUpload:
        type: boolean
      encryptedCollectionKey:
        type: string
      recipientUserId:
        type: string
      uploadQuotaBytes:
        type: integer
    type: object
  handlers.ShareFederatedRequest:
    properties:
      canDelete:
        type: boolean
      canUpload:
        type: boolean
      encryptedCollectionKey:
        type: string
      recipientServer:
        type: string
      recipientUsername:
        type: string
      uploadQuotaBytes:
        type: integer
    type: object
  handlers.ShareFederatedResult:
    properties:
      inviteToken:
        type: string
      inviteUrl:
        type: string
    type: object
  handlers.StatsResponse:
    properties:
      activeUsers:
        type: integer
      totalCollections:
        type: integer
      totalFiles:
        type: integer
      totalStorageUsedBytes:
        type: integer
      totalUsers:
        type: integer
    type: object
  handlers.TOTPCodeRequest:
    properties:
      code:
        type: string
    type: object
  handlers.TOTPSetupResponse:
    properties:
      qrUri:
        type: string
      secret:
        type: string
    type: object
  handlers.TwoFALoginRequest:
    properties:
      code:
        type: string
      preAuthToken:
        type: string
    type: object
  handlers.UpdateAdminSettingsRequest:
    properties:
      registrationEnabled:
        type: boolean
    type: object
  handlers.UpdateAdminUserRequest:
    properties:
      isActive:
        type: boolean
      isAdmin:
        type: boolean
      storageQuotaBytes:
        type: integer
    type: object
  handlers.UpdateCollectionRequest:
    properties:
      encryptedName:
        type: string
      nameNonce:
        type: string
    type: object
  handlers.UpdateColorRequest:
    properties:
      color:
        type: string
    type: object
  handlers.UploadResult:
    properties:
      id:
        type: string
    type: object
  handlers.UserLookupResponse:
    properties:
      publicKey:
        type: string
      userId:
        type: string
    type: object
  handlers.UserRow:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      isAdmin:
        type: boolean
      storageQuotaBytes:
        type: integer
      storageUsedBytes:
        type: integer
      totpEnabled:
        type: boolean
      username:
        type: string
    type: object
host: localhost
info:
  contact: {}
  description: Self-hosted, end-to-end encrypted file storage with federation. All
    file content and metadata are encrypted client-side; the server stores only ciphertext.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Kutup API
  version: 1.0.0
paths:
  /admin/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SettingsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get server settings
      tags:
      - Admin
    put:
      consumes:
      - application/json
      parameters:
      - description: Settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateAdminSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SettingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update server settings
      tags:
      - Admin
  /admin/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.StatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get aggregate server statistics
      tags:
      - Admin
  /admin/users:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.UserRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - Admin
    post:
      consumes:
      - application/json
      parameters:
      - description: User details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAdminUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Email or username already taken
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a user account (admin)
      tags:
      - Admin
  /admin/users/{id}:
    delete:
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: ""
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user and all their data
      tags:
      - Admin
    put:
      consumes:
      - application/json
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (all optional)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateAdminUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a user (quota, active, admin flag)
      tags:
      - Admin
  /auth/complete-setup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Full key bundle
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Complete first-login setup
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns full tokens on success, or a preAuthToken when 2FA is required
        (requiresTotp=true), or a setupToken when first login (requiresSetup=true).
      parameters:
      - description: Email and derived login key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Rate limited (10/min per IP)
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/login/2fa:
    post:
      consumes:
      - application/json
      description: Submit TOTP code with the preAuthToken from the login response.
        Locked after 5 failed attempts.
      parameters:
      - description: Pre-auth token and TOTP code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.TwoFALoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Too many failed TOTP attempts
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Complete 2FA login
      tags:
      - Auth
  /auth/login/preflight:
    get:
      parameters:
      - description: Email address
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PreflightLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Rate limited (20/min per IP)
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Fetch KDF salts before login
      tags:
      - Auth
  /auth/recover:
    post:
      consumes:
      - application/json
      parameters:
      - description: Recovery proof and new key material
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RecoverRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Rate limited (5/hr per IP)
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Recover account using mnemonic recovery key
      tags:
      - Auth
  /auth/recover/preflight:
    get:
      parameters:
      - description: Email address
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PreflightRecoverResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "429":
          description: Rate limited (5/hr per IP)
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Fetch encrypted recovery data before account recovery
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token (or pass via refresh_token cookie)
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RefreshResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Encrypted key bundle and credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Registration disabled
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Email or username already taken
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Register a new account
      tags:
      - Auth
  /auth/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SettingsResponse'
      summary: Get public server settings
      tags:
      - Auth
  /collections:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.CollectionRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List collections
      tags:
      - Collections
    post:
      consumes:
      - application/json
      parameters:
      - description: Encrypted collection name and key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateCollectionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.CreateCollectionResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a collection
      tags:
      - Collections
  /collections/{id}:
    delete:
      parameters:
      - description: Collection UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: ""
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a collection and all its files
      tags:
      - Collections
    get:
      parameters:
      - description: Collection UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CollectionRow'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a collection
      tags:
      - Collections
    put:
      consumes:
      - application/json
      parameters:
      - description: Collection UUID
        in: path
        name: id
        required: true
        type: string
      - description: New encrypted name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateCollectionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Rename a collection
      tags:
      - Collections
  /collections/{id}/color:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Collection UUID
        in: path
        name: id
        required: true
        type: string
      - description: Color name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateColorRequest'
      responses:
        "204":
          description: ""
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
